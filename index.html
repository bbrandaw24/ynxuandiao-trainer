<!DOCTYPE html>
<html lang=zh-CN>

<title>云南定向选调·训练系统</title>
<script src=https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f7fa;--card:#fff;--primary:#1a73e8;--p-light:#e8f0fe;--ok:#0f9d58;--err:#d93025;--warn:#f9ab00;--txt:#202124;--t2:#5f6368;--bd:#dadce0;--r:12px;--sh:0 1px 3px #00000014}
body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Noto Sans SC,sans-serif;background:var(--bg);color:var(--txt);line-height:1.6}
.c{max-width:1100px;margin:0 auto;padding:16px}
.hd{background:linear-gradient(135deg,#1a73e8,#1557b0);color:#fff;border-radius:0 0 var(--r) var(--r);padding:24px 20px;margin-bottom:20px}
.hd h1{font-size:24px}.hd p{opacity:.85;font-size:13px}
.mb{display:flex;gap:6px;margin-bottom:16px}
.mb-btn{flex:1;padding:10px;text-align:center;border:2px solid var(--bd);border-radius:10px;cursor:pointer;background:var(--card)}.mb-btn.act{border-color:var(--primary);background:var(--p-light)}
.pn{display:none}.pn.act{display:block}
.cd{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:20px;margin-bottom:14px}
.ct{font-size:17px;font-weight:600;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--bd)}
.gd{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px}
.gd-item{background:var(--card);border-radius:var(--r);padding:14px;text-align:center;box-shadow:var(--sh)}
.gd-v{font-size:26px;font-weight:700}.gd-l{font-size:12px;color:var(--t2);margin-top:2px}
.nt{display:flex;gap:4px;margin-bottom:16px;background:var(--card);border-radius:var(--r);padding:5px;flex-wrap:wrap;box-shadow:var(--sh)}
.nt-btn{padding:8px 16px;border:none;background:transparent;border-radius:8px;cursor:pointer;font-size:13px;color:var(--t2)}.nt-btn.act{background:var(--primary);color:#fff;font-weight:500}
.og{display:grid;gap:8px}
.oi{padding:12px 14px;border:2px solid var(--bd);border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:14px;transition:.2s}
.oi:hover{border-color:var(--primary);background:var(--p-light)}
.oi.ok{border-color:var(--ok)!important;background:#e6f4ea!important}
.oi.wr{border-color:var(--err)!important;background:#fce8e6!important}
.oi.di{cursor:default;opacity:.7}
.ol{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:var(--bg);font-weight:600;font-size:12px;flex-shrink:0}
.oi.ok .ol{background:var(--ok);color:#fff}.oi.wr .ol{background:var(--err);color:#fff}
.ab{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;align-items:center}
.btn{padding:8px 20px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500}.btn:disabled{opacity:.5;cursor:default}
.btn-p{background:var(--primary);color:#fff}.btn-w{background:var(--warn);color:#fff}.btn-s{background:var(--bg);color:var(--txt)}.btn-d{background:var(--err);color:#fff}
.btn-sm{padding:5px 12px;font-size:12px}
.ex{margin-top:14px;padding:14px;border-radius:10px;background:#f8f9fa;border-left:4px solid var(--primary);display:none;white-space:pre-wrap;font-size:13px;line-height:1.7}
.ex.s{display:block}
.sc{font-size:11px;color:var(--t2);background:#f0f0f0;padding:1px 6px;border-radius:8px;margin-left:6px;white-space:nowrap}
.ei{padding:12px;border:1px solid var(--bd);border-radius:8px;margin-bottom:6px;cursor:pointer}
.ei:hover{background:var(--p-light)}
.eq{font-weight:500;font-size:13px;margin-bottom:3px}
.ed{font-size:12px;color:var(--t2)}
.wa{color:var(--err);font-weight:600}.ra{color:var(--ok);font-weight:600}
.cb{background:var(--card);border-radius:var(--r);padding:14px;box-shadow:var(--sh);margin-bottom:12px}
.cb h3{font-size:14px;margin-bottom:10px;color:var(--t2)}
.sm{border-left:3px solid #1a73e8;background:#e8f0fe;margin:4px 0;padding:6px 10px;border-radius:6px;font-size:12px;line-height:1.5}
.su{border-left:3px solid #5f6368;background:#f5f5f5;margin:4px 0 4px 16px;padding:6px 10px;border-radius:6px;font-size:12px}
.str{color:var(--warn)}.str2{color:var(--t2)}
@media(max-width:600px){.hd h1{font-size:20px}.nt-btn{padding:6px 10px;font-size:12px}}
</style>
</head><body>
<div class=c>
<div class=hd><h1>云南定向选调 · 综合训练</h1><p>行测+公基全客观 | 点击即答 | 衍生消错 | GitHub同步</p></div>
<div class=mb><div class="mb-btn act" data-m=0 onclick=swM(0)>📝 刷题</div><div class=mb-btn data-m=1 onclick=swM(1)>💬 复盘</div><div class=mb-btn data-m=2 onclick=swM(2)>📈 考情</div></div>

<!-- QUIZ -->
<div id=p0 class="pn act">
<div class=nt id=catBar></div>
<div class=gd id=stBox><div class=gd-item><div class="gd-v b" id=tC>0</div><div class=gd-l>总题</div></div><div class=gd-item><div class="gd-v g" id=rC>0</div><div class=gd-l>正确</div></div><div class=gd-item><div class="gd-v r" id=wC>0</div><div class=gd-l>错误</div></div><div class=gd-item><div class="gd-v b" id=aC>0%</div><div class=gd-l>正确率</div></div></div>
<div class=cd>
<div style=display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:12px><span><span class=sc id=qCat style=background:#e8f0fe;color:#1a73e8;font-size:12px;padding:3px 10px>加载</span></span><span style=font-size:12px;color:var(--t2) id=qPr></span></div>
<div id=qTx style=font-size:15px;font-weight:500;line-height:1.7;margin-bottom:10px></div>
<div id=optA></div>
<div class=ab id=actB style=display:none>
<button class="btn btn-w" id=dkB onclick=markU()>❓ 不会</button>
<span id=nH style=font-size:12px;color:var(--t2);display:none>点击选项→下一题</span>
<button class="btn btn-sm btn-p" onclick=expC() style=margin-left:auto>📋 导出</button>
<button class="btn btn-sm btn-p" onclick=expG(this)>📤 GitHub</button>
<button class="btn btn-sm btn-s" onclick=restoreGit()>⬇ 从GitHub恢复</button>
</div>
<div class=ex id=exB><strong>解析：</strong><span id=exT></span></div>
</div>
<div class=cd><div class=ct>❌ 错题 <span style=font-size:12px;font-weight:400;color:var(--t2) id=erL>(0)</span></div><div id=erLst></div></div>
</div>

<!-- SOCRATIC -->
<div id=p1 class=pn><div class=cd><div class=ct>💬 苏格拉底复盘</div><p style=font-size:13px;color:var(--t2);margin-bottom:12px>聊天中的追问对话记录在此。</p><div id=socL></div></div></div>

<!-- ANALYSIS -->
<div id=p2 class=pn>
<div class=cd><div class=ct>📈 考情演变</div><div id=tlB></div></div>
<div style=display:grid;grid-template-columns:1fr 1fr;gap:12px>
<div class=cb><h3>公基vs行测</h3><canvas id=c1></canvas></div>
<div class=cb><h3>行测子模块</h3><canvas id=c2></canvas></div>
<div class=cb><h3>公基子模块</h3><canvas id=c3></canvas></div>
<div class=cb><h3>行测占比趋势</h3><canvas id=c4></canvas></div>
</div>
<div class=cd style=margin-top:12px><div class=ct>📋 备考策略</div><div id=sB></div></div>
</div>
</div>

<script>
// ===== DATA =====
var EX = [{y:'2021前',g:100,x:0,gx:{sz:30,sq:25,fl:15,ds:10,mk:8,kj:7,dl:5},xx:{yy:0,pd:0,sl:0,zl:0},n:'纯公基'},{y:'2023',g:85,x:15,gx:{sz:25,sq:22,fl:13,ds:10,mk:7,kj:5,dl:3},xx:{yy:5,pd:6,sl:2,zl:2},n:'首加行测'},{y:'2024',g:65,x:35,gx:{sz:18,sq:15,fl:10,ds:8,mk:5,kj:5,dl:4},xx:{yy:10,pd:10,sl:7,zl:8},n:'行测35题'},{y:'2025',g:65,x:35,gx:{sz:18,sq:12,fl:10,ds:8,mk:6,kj:6,dl:5},xx:{yy:10,pd:10,sl:7,zl:8},n:'延续'},{y:'2026',g:50,x:50,gx:{sz:16,sq:8,fl:7,ds:5,mk:5,kj:5,dl:4},xx:{yy:12,pd:16,sl:10,zl:12},n:'各半'}];
var L=['A','B','C','D'];var QB={};function rQ(c,q){QB[c]=q}

// ===== QUESTION BANK =====
rQ('新思想',[
{q:'习近平新时代中国特色社会主义思想明确中国特色社会主义最本质的特征是什么？（2024云南定向选调·原题）',o:['人民民主专政','中国共产党领导','依法治国','社会主义公有制'],a:1,e:'本质特征是中国共产党领导。\n\n为什么是这个答案？习近平在多个场合明确强调"中国特色社会主义最本质的特征是中国共产党领导"。人民民主专政是国体（回答"国家性质是什么"），而"最本质特征"是回答"中国特色社会主义为什么叫社会主义"——区别在于党是领导核心。记法：本质→党，国体→人民。},
{q:'"五位一体"总体布局不包括以下哪项？（2023国考行测·原题）',o:['经济建设','政治建设','文化建设','国防建设'],a:3,e:'位一体不包含国防建设。\n\n五位一体是经济、政治、文化、社会、生态文明。国防建设属于"国家安全"范畴，不在其中。记法：五位一体管"发展"，国防管"安全"。},
{q:'"四个全面"中2020年后新增的"全面"是什么？（2024云南定向选调·原题）',o:['全面深化改革','全面依法治国','全面从严治党','全面建设社会主义现代化国家'],a:3,e:'面建设社会主义现代化国家。\n\n2020年全面建成小康社会目标达成后，第一个"全面"从"全面建成小康社会"升级而来，体现战略与时俱进。},
{q:'习近平生态文明思想核心要义？（2023云南定向选调·原题）',o:['绿水青山就是金山银山','保护环境人人有责','节约优先','防治污染'],a:0,e:'水青山就是金山银山。\n\n2013年提出，强调生态优势可转化为经济优势。案例：浙江安吉余村从开矿转型旅游，既保护环境又实现致富。},
{q:'新时代我国社会主要矛盾？（2022国考题·改编）',o:['物质文化需要同落后生产矛盾','美好生活需要同不平衡不充分矛盾','生产力与生产关系矛盾','阶级斗争'],a:1,e:'民日益增长的美好生活需要和不平衡不充分的发展之间的矛盾。\n\n1981年提出"物质文化需要同落后社会生产"矛盾（"有没有"的问题），2017年十九大重新判断（"好不好"的问题）。}
,{q:'人类命运共同体核心？（2024云南定向选调·原题）',o:['互相制裁','以邻为壑','合作共赢','武力威慑'],a:2,e:'作共赢。\n\n2013年习近平在莫斯科首次提出，强调各国利益交融安危与共，已写入联合国决议。},{q:'"一带一路"中"一带"指？（2023国考行测·原题）',o:['海上丝绸之路','丝绸之路经济带','中巴经济走廊','亚洲公路网'],a:1,e:'绸之路经济带。\n\n2013年在哈萨克斯坦和印尼分别提出"一带一路"和一"路"，覆盖亚欧非。},{q:'新发展理念中解决动力问题的是？（2024云南定向选调·原题）',o:['协调','绿色','开放','创新'],a:3,e:'新。\n\n创新动力、协调平衡、绿色人与自然、开放内外联动、共享公平。创新排第一。},{q:'强军目标是什么？（2023国考·改编）',o:['听党指挥能打胜仗作风优良','世界一流军队','科技强军','依法治军'],a:0,e:'党指挥能打胜仗作风优良。\n\n2017年十九大明确，核心是党指挥枪。对比旧版"五句话"更简洁。},{q:'全过程人民民主本质？（2024云南定向选调·原题）',o:['人民当家作主','选举民主','协商民主','基层自治'],a:0,e:'民当家作主。\n\n与西方代议制的区别：涵盖选举决策管理监督全链条，而非仅投票。},{q:'习近平法治思想"十一个坚持"首要的是？（2023云南定向选调·原题）',o:['依宪治国','党的领导','人民主体地位','依法治国'],a:1,e:'的领导。\n\n第一条就是坚持党对全面依法治国的领导，这是最根本保证。},{q:'中国特色大国外交推动构建什么？（2022国考题·改编）',o:['新世界秩序','人类命运共同体','西方全球化','地区联盟'],a:1,e:'类命运共同体。\n\n已写入党章和宪法。并非建立"新世界秩序"（易被误解为霸权）。},{q:'"双循环"中主体是？（2023国考题·改编）',o:['国际循环','国内循环','内外井重','出口导向'],a:1,e:'内循环。\n\n2020年提出，14亿人口超大规模市场是优势基础，并非闭关锁国。},{q:'共同富裕最艰巨任务在哪？（2024云南定向选调·原题）',o:['城市','农村','沿海','特区'],a:1,e:'村。\n\n城乡收入差距约2.5倍，基础设施和公共服务短板明显。农村不富不算共同富裕。},{q:'文化自信"更基础"体现在？（2024云南定向选调·原题）',o:['道路理论根基','制度基础','经济基础','军事基础'],a:0,e:'路和理论的根基。\n\n四个自信中文化自信是更基础更广泛更深厚的，因为道路理论制度都植根于中华文化沃土。},{q:'中国特色社会主义进入新时代我国社会主要矛盾的变化是？',o:['从物质文化需要到美好生活需要','从落后生产到不平衡不充分','从温饱到小康','从贫穷到富裕'],a:0,e:'要矛盾转化为美好生活需要和不平衡不充分。\n\n十九大重新判断。1981提"物质文化需要"（有没有），2017提"美好生活同不平衡不充分"（好不好）。},{q:'习近平文化思想的核心要义强调坚定文化自信。文化自信最深厚的根源在于？',o:['中华优秀传统文化','经济增长','军事实力','国际地位'],a:0,e:'化自信根源在中华优秀传统文化。\n\n5000年文明不间断是独特优势。},{q:'中国式现代化的本质要求中排在首位的是？',o:['坚持中国共产党领导','实现共同富裕','发展全过程人民民主','丰富人民精神世界'],a:0,e:'首位的是坚持党的领导。\n\n中国式现代化九个本质要求第一条就是党的领导。},{q:'习近平经济思想中新发展理念的五个方面不包括？',o:['高速','创新','绿色','共享'],a:0,e:'发展理念不包括"高速"。\n\n创新协调绿色开放共享五个方面。},{q:'全面从严治党的基础性工程是？',o:['加强党的长期执政能力建设','坚定理想信念宗旨','党的政治建设','党的组织建设'],a:1,e:'定理想信念宗旨。\n\n政治建设是统领，思想建设是基础。},{q:'习近平生态文明思想的核心要义是？',o:['人与自然和谐共生','绿水青山就是金山银山','山水林田湖草沙一体化保护','用最严格制度保护生态环境'],a:0,e:'与自然和谐共生。\n\n超越人类中心主义，天人和合的当代表达。},{q:'四个意识不包括以下哪项？',o:['政治意识','大局意识','核心意识','发展意识'],a:3,e:'个意识：政治大局核心看齐。\n\n无"发展意识"。},{q:'中国特色社会主义事业总体布局是？',o:['五位一体','四个全面','一带一路','两个一百年'],a:0,e:'位一体：经济政治文化社会生态。\n\n十八大从四位一体升级。},{q:'新时代坚持和发展中国特色社会主义的根本立场是？',o:['以人民为中心','以经济建设为中心','坚持改革开放','坚持党的领导'],a:0,e:'人民为中心。\n\n以经济建设为中心是兴国之要，以人民为中心是立场。},{q:'习近平强军思想强调的强军之魂是？',o:['党对军队的绝对领导','科技强军','依法治军','从严治军'],a:0,e:'对军队的绝对领导。\n\n强军之魂，任何时候不能动摇。},{q:'推动构建人类命运共同体中国倡导的新型国际关系核心是？',o:['相互尊重公平正义合作共赢','竞争对抗零和博弈','结盟对抗集团政治','大国协调共治'],a:0,e:'互尊重公平正义合作共赢。\n\n区别于西方赢者通吃零和思维。},{q:'十九大报告提出从2020年到本世纪中叶分两阶段安排。第一阶段到2035年的目标是？',o:['基本实现社会主义现代化','全面建成小康社会','建成社会主义现代化强国','实现共同富裕'],a:0,e:'本实现社会主义现代化。\n\n2020-2035基本现代化，2035-2050建成强国。},{q:'中央八项规定精神的核心是？',o:['改进工作作风密切联系群众','反对腐败','加强党的建设','推动经济发展'],a:0,e:'进工作作风密切联系群众。\n\n八项规定核心是端正风气。},{q:'社会主义核心价值观国家层面的价值目标是？',o:['富强民主文明和谐','自由平等公正法治','爱国敬业诚信友善','独立自由民主富强'],a:0,e:'强民主文明和谐。三个层面：国家\n\n社会 个人。}]);

{q:'扎西会议历史意义？（2023国考行测·原题）',o:['确立毛领导','完成组织调整和部队整编','决定长征','建立统一战线'],a:1,e:'成遵义会议未解决的组织调整。\n\n遵义会议后博古仍拖延交权，扎西正式通过决议、完成领导权交接、红军缩编为16个团。},
{q:'中共一大时间？（2022云南定向选调·原题）',o:['1920上海','1921上海','1922北京','1923广州'],a:1,e:'921年7月23日上海开幕。\n\n因遭法租界巡捕搜查，转移至嘉兴南湖游船闭幕。建党节7月1日是毛泽东定的纪念日（抗战时期难考证具体日期）。},
{q:'遵义会议年份？（2023国考·原题）',o:['1934','1935','1936','1937'],a:1,e:'935年1月15-17日。\n\n红军出发时8.6万人，湘江战役后仅剩3万人，博古李德错误指挥引发不满，会议确立毛泽东领导地位。},
{q:'党的二十大年份？（2024国考行测·原题）',o:['2021','2022','2023','2024'],a:1,e:'022年10月16-22日。\n\n在建党百年后召开，主题：高举中国特色社会主义伟大旗帜，为全面建设社会主义现代化国家而团结奋斗。}
,{q:'"枪杆子里出政权"谁提出？（2023云南定向选调·原题）',o:['周恩来','朱德','毛泽东','刘少奇'],a:2,e:'泽东八七会议提出。\n\n1927年八七会议背景：四一二政变屠杀共产党人，党认识到必须有自己的武装。},{q:'延安整风不包括？（2022国考题·改编）',o:['反主观主义','反宗派主义','反党八股','反自由主义'],a:3,e:'自由主义。\n\n三大任务：主观主义（思想）、宗派主义（组织）、党八股（文风）。},{q:'新中国第一部宪法年份？（1954）',o:['1949','1954','1956','1978'],a:1,e:'954年。\n\n第一部社会主义类型宪法，确立人民民主专政和人大制度。此前有《共同纲领》。},{q:'改革开放始于？（1978十一届三中全会）',o:['十一届三中全会','十二大','十一届六中全会','十三大'],a:0,e:'978年十一届三中全会。\n\n此前有"两个凡是"和真理标准大讨论，全会果断停止"以阶级斗争为纲"。},{q:'七大确立的指导思想？（毛泽东思想）',o:['马克思主义','列宁主义','毛泽东思想','邓小平理论'],a:2,e:'泽东思想。\n\n1945年七大确立，党首次以领导人命名的理论体系，标志马中化第一次历史性飞跃。},{q:'红军长征途中召开的最重要会议是？',o:['遵义会议','扎西会议','八七会议','古田会议'],a:0,e:'义会议。\n\n1935确立毛泽东领导，生死攸关转折点。},{q:'中国共产党第七次全国代表大会召开的地点是？',o:['延安','井冈山','西柏坡','瑞金'],a:0,e:'安。\n\n1945七大确立毛泽东思想。},{q:'八七会议确立的总方针是？',o:['土地革命和武装反抗国民党','建立抗日民族统一战线','开展游击战争','建立农村根据地'],a:0,e:'地革命和武装反抗国民党。\n\n八七会议1927汉口。},{q:'瓦窑堡会议确定了什么方针？',o:['建立抗日民族统一战线','停止内战一致抗日','和平解决西安事变','全面抗战路线'],a:0,e:'立抗日民族统一战线。\n\n瓦窑堡会议1935。},{q:'重庆谈判签订的协议是？',o:['双十协定','停战协定','和平协议','国共合作宣言'],a:0,e:'十协定。\n\n重庆谈判43天。},{q:'新中国成立后党面临的主要任务是？',o:['恢复国民经济巩固人民政权','进行社会主义改造','实现工业化','抗美援朝'],a:0,e:'复国民经济巩固人民政权。\n\n建国初首要任务。},{q:'过渡时期总路线的主体是？',o:['实现社会主义工业化','实现对农业的改造','实现对资本主义工商业的改造','实现手工业合作化'],a:0,e:'现社会主义工业化。\n\n"一化三改"主体。},{q:'五四运动标志着什么？',o:['中国新民主主义革命的开端','中国共产党的成立','抗日战争的开始','社会主义革命的开始'],a:0,e:'国新民主主义革命开端。\n\n五四运动工人阶级登台。},{q:'党的七大提出的三大作风是？',o:['理论联系实际密切联系群众批评与自我批评','实事求是群众路线独立自主','民主集中制群众路线批评与自我批评','理论联系实际艰苦奋斗批评与自我批评'],a:0,e:'论联系实际密切联系群众批评与自我批评。\n\n三大作风。}]);
rQ('马原',[
{q:'马哲区别于旧哲学最显著特征？（2024国考行测·改编）',o:['阶级性','实践性','科学性','革命性'],a:1,e:'践性。\n\n旧哲学（黑格尔、费尔巴哈）只是"解释世界"，马克思主义强调"改变世界"。实践是马哲的"第一观点"。},
{q:'"千里之堤溃于蚁穴"体现什么？（2023云南定向选调·原题）',o:['量变引起质变','对立统一','否定之否定','现象本质'],a:1,e:'变引起质变。\n\n蚁穴虽小（量变积累）→堤溃（质变飞跃）。类似：冰冻三尺非一日之寒。量变是渐进的，质变是飞跃的。},
{q:'商品二因素关系？（2024云南定向选调·原题）',o:['无关','对立统一','完全一致','排斥'],a:1,e:'立统一。\n\n共同存在于商品中（统一），但交换时买方要使用价值、卖方要价值（对立）。这一矛盾是商品经济的基本矛盾。},
{q:'剩余价值来源？（2023国考行测·原题）',o:['先进机器','管理效率','雇佣工人剩余劳动','技术进步'],a:2,e:'佣工人的剩余劳动。\n\n机器只能转移价值不创造价值。工人劳动创造的价值=工资+剩余价值，剩余价值被资本家无偿占有。},
{q:'实践是检验真理唯一标准基于？（2022云南定向选调·原题）',o:['真理客观性','实践直接现实性','真理相对性','实践社会历史性'],a:1,e:'践具有直接现实性。\n\n理论自己无法检验自己，只有通过实践把主观认识变成客观结果，才能判断认识对错。好比你说"水能喝"，只有喝了才知道。}
,{q:'唯物辩证法总特征？（2023国考题·原题）',o:['对立统一','联系和发展','量变质变','否定之否定'],a:1,e:'系和发展。\n\n总特征是联系的观点和发展的观点，而非"对立统一"（那是核心规律）。},{q:'事物发展根本原因？（2024云南定向选调·原题）',o:['外部矛盾','内部矛盾','环境变化','条件变化'],a:1,e:'因。\n\n鸡蛋因温度变鸡子（内因决定），石头不论多热不变鸡子。打铁还需自身硬。},{q:'经济危机根源？（2023国考·改编）',o:['生产过剩','需求不足','资本主义基本矛盾','全球化'],a:2,e:'本主义基本矛盾。\n\n生产社会化与私有制矛盾，表现为"相对过剩"——不是东西太多而是买不起。},{q:'不变和可变资本划分依据？（2024云南公考·改编）',o:['周转速度','价值转移方式','剩余价值生产中不同作用','使用年限'],a:2,e:'余价值中不同作用。\n\nC买生产资料转移价值，V买劳动力创造大于自身的价值。揭示剩余价值来源。},{q:'货币基本职能？（2023云南定向选调·原题）',o:['流通和支付','价值和流通','贮藏和世界','支付和贮藏'],a:1,e:'值尺度和流通手段。\n\n五大职能中前两个是基本的，后三个（贮藏支付世界）是衍生的。},{q:'"白马非马"错误？（2024国考题·改编）',o:['否认矛盾普遍性','割裂共性与个性','否认量变质变','否认否定之否定'],a:1,e:'裂共性与个性。\n\n战国公孙龙诡辩，"白"是特殊"马"是普遍，特殊包含普遍。像说"苹果不是水果"。},{q:'超额剩余价值来源？（2023云南定向选调·原题）',o:['延长劳动时间','提高劳动生产率','增加劳动强度','降低工资'],a:1,e:'高劳动生产率。\n\n个别企业用新技术比别人效率高→2倍剩余价值。其他企业模仿→社会生产率提高。},{q:'感性认识与理性认识关系？（2024云南定向选调·原题）',o:['独立','感性依赖理性','理性依赖感性相互渗透','感性高于理性'],a:2,e:'性依赖感性相互渗透。\n\n看苹果落地是感性，发现万有引力是理性。巧妇难为无米之炊。},{q:'劳动力成为商品条件？（2023国考·改编）',o:['有人身自由且一无所有','有生产资料','有技术','资本充足'],a:0,e:'人身自由且一无所有。\n\n两个条件：①人身自由②无生产资料。圈地运动制造了大量一无所有的自由劳动者。},{q:'上层建筑对经济基础的作用？（2024云南定向选调·原题）',o:['决定','反作用','平行','无影响'],a:1,e:'作用。\n\n经济基础决定上层建筑，但上层建筑反作用于经济基础（过时的法律阻碍创新时需变革）。},{q:'矛盾普遍性和特殊性的辩证关系原理要求我们？',o:['把马克思主义基本原理同中国具体实际相结合','从抽象到具体','坚持两点论','抓住主要矛盾'],a:0,e:'马基同中国具体实际相结合。\n\n矛盾普遍性特殊性原理。},{q:'马克思主义政治经济学认为资本主义基本矛盾是？',o:['生产社会化与生产资料私有制','无产阶级与资产阶级','生产与消费','计划经济与市场经济'],a:0,e:'产社会化与生产资料私有制。\n\n资本主义基本矛盾致周期危机。},{q:'哲学的基本问题是？',o:['思维和存在的关系问题','物质和意识的关系问题','实践和认识的关系问题','真理和谬误的关系问题'],a:0,e:'维和存在关系。\n\n恩格斯在《费尔巴哈论》提出。},{q:'事物发展的根本原因在于？',o:['事物内部的矛盾性','外部环境的变化','量的积累','否定之否定'],a:0,e:'物内部矛盾性。\n\n内因是变化的根据外因是条件。},{q:'真理的绝对性和相对性统一原理要求我们？',o:['坚持真理绝对性和相对性的辩证统一防止绝对主义和相对主义','要么绝对正确要么完全错误','只承认绝对真理','只承认相对真理'],a:0,e:'持真理绝对性和相对性统一。\n\n防止绝对主义和相对主义。},{q:'经济基础决定上层建筑原理说明？',o:['生产力决定生产关系并对上层建筑起决定作用','上层建筑决定经济基础','经济基础和上层建筑互不影响','上层建筑可以脱离经济基础'],a:0,e:'产力决定生产关系并对上层建筑起决定作用。\n\n上层建筑反作用。},{q:'马克思主义认识论首要的基本观点是？',o:['实践的观点','群众的观点','阶级的观点','发展的观点'],a:0,e:'践的观点。\n\n认识论首要基本观点。},{q:'社会主义从空想到科学的决定性环节是？',o:['唯物史观和剩余价值学说的创立','无产阶级革命','巴黎公社','十月革命'],a:0,e:'物史观和剩余价值学说。\n\n空想变科学。},{q:'马克思的两个伟大发现是？',o:['唯物史观和剩余价值学说','辩证唯物主义和历史唯物主义','政治经济学和科学社会主义','无产阶级革命和无产阶级专政'],a:0,e:'物史观和剩余价值学说。\n\n马克思两大发现。}]);
rQ('法律',[{q:'2024年行政复议法最大改革？（2024云南定向选调·改编）',o:['扩大范围','集中管辖','取消前置','简化程序'],a:1,e:'行集中管辖。\n\n以前多个部门各管各的复议（"条条管辖"相当于自己当自己法官），现在集中由县级以上政府统一行使，提高公正性。},{q:'宪法最高法律效力体现在？（2023国考行测·原题）',o:['是普通法律立法基础','可代替普通法律','只约束政府','修改简单'],a:0,e:'法是普通法律的立法基础。\n\n宪法是人民主权（制宪权）的体现，普通法律是全国人大（立法权）制定的。制宪权高于立法权，故一切法律不得与宪法抵触。},{q:'民法典可撤销婚姻情形？（2024云南定向选调·原题）',o:['重婚','近亲','未到法定婚龄','被胁迫结婚'],a:3,e:'胁迫结婚。\n\n可撤销（被胁迫、隐瞒疾病）≠无效（重婚、近亲、未到婚龄）。可撤销由当事人申请，撤销前婚姻有效。},{q:'全国人大每届任期？（2023国考·原题）',o:['3年','4年','5年','6年'],a:2,e:'年。\n\n一届全国人大任期4年（1954-1959），二届后改为5年。每年开一次全体会议（两会），闭会由常委会行使职权。},{q:'自甘风险规则适用？（2024云南公考·改编）',o:['商业活动','文体活动','教育活动','医疗活动'],a:1,e:'体活动。\n\n民法典1176条：自愿参加文体活动受伤，不得向其他参加者索赔。目的是鼓励活动开展，防止"摔倒就告人"。但组织者未尽安全保障义务仍需负责。},{q:'被胁迫结婚属于？（2024云南定向选调·原题）',o:['重婚','近亲','未到法定婚龄','被胁迫结婚'],a:3,e:'胁迫结婚。\n\n可撤销≠无效。可撤销（被胁迫隐瞒疾病）申请撤销前有效；无效（重亲近亲未到婚龄）自始无效。},{q:'首违不罚适用？（2024国考·改编）',o:['所有违法','轻微违法并及时改正','严重违法','刑事犯罪'],a:1,e:'微违法并及时改正。\n\n需同时满足三个条件：初次+危害轻微+及时改正。体现教育导向。},{q:'最高国家权力机关？（2022云南定向选调·原题）',o:['国务院','全国人大','中央军委','最高法'],a:1,e:'国人大。\n\n其他国家机关由它产生对它负责，不同于西方三权分立。},{q:'产品缺陷侵权责任原则？（2024云南定向选调·改编）',o:['过错责任','无过错责任','公平责任','推定过错'],a:1,e:'过错责任。\n\n消费者无法了解生产过程，让生产者证明自己无过错不公平。例外：未投入流通等。},{q:'根据2024年修改的《国防教育法》全民国防教育日是每年9月的？',o:['第三个星期六','第一个星期六','第二个星期日','第三个星期日'],a:0,e:'三个星期六。\n\n2024国防教育法。},{q:'我国宪法规定社会主义初级阶段的基本经济制度是？',o:['公有制为主体多种所有制共同发展','按劳分配为主体多种分配方式并存','社会主义市场经济体制','国有经济为主导'],a:0,e:'有制为主体多种所有制共同发展。\n\n宪法第6条。},{q:'2024年修改的《突发事件应对法》强调的原则是？',o:['人民至上生命至上','效率优先','快速处置','预防为主'],a:0,e:'民至上生命至上。\n\n抗疫核心理念入法。},{q:'我国刑法规定正当防卫明显超过必要限度造成重大损害的应当负刑事责任但应当？',o:['减轻或者免除处罚','从重处罚','与普通犯罪同等处罚','加重处罚'],a:0,e:'轻或者免除处罚。\n\n刑法第20条。},{q:'根据民法典人格权编自然人享有隐私权。隐私权包括？',o:['私人生活安宁和不愿为他人知晓的私密空间私密活动私密信息','姓名和肖像','名誉和荣誉','个人信息'],a:0,e:'人生活安宁和不愿为他人知晓的私密空间私密活动私密信息。\n\n民法典1032条。},{q:'行政强制措施的种类不包括？',o:['行政拘留','限制公民人身自由','查封场所设施或者财物','扣押财物'],a:0,e:'政拘留。\n\n行政拘留是处罚不是强制措施。},{q:'劳动者提前多少日以书面形式通知用人单位可以解除劳动合同？',o:['30日','15日','7日','3日'],a:0,e:'0日。\n\n劳动合同法第37条。},{q:'根据民法典夫妻共同债务认定原则以下正确的是？',o:['夫妻双方共同签名或事后追认的债务','一方单独签字的债务','一方赌博所欠债务','一方婚前个人债务'],a:0,e:'妻双方共同签名或事后追认。\n\n民法典1064条"共签共债"。}]);

,{q:'Yunnan unique ethnic minorities count?',o:['4','5','3','6'],a:0,e:'个。\n\n独龙族（怒江）、德昂族（德宏）、基诺族（版纳）、怒族（怒江）。基诺族1979年才确认。},{q:'茶马古道核心起点？（2024国考题·改编）',o:['昆明','普洱','大理','丽江'],a:1,e:'洱（原思茅）。\n\n一条经大理丽江进藏，另一条经版纳进老挝缅甸。唐宋以来用茶叶换马匹。},{q:'红河哈尼梯田列入？（2023云南定向选调·原题）',o:['国家自然遗产','世界文化遗产','世界自然遗产','双重遗产'],a:1,e:'界文化遗产。\n\n1300年历史、最高3700级、超100万亩。"森林-村寨-梯田-水系"四素同构。},{q:'量子计算"九章"突破？（2024云南公考行测·原题）',o:['量子通信卫星','量子优越性','量子密码','量子雷达'],a:1,e:'子优越性。\n\n2020年光量子计算机实现——比最快超算快10^14倍。},{q:'云南民族种类最多的原因？（2024云南定向选调·原题）',o:['地形复杂山高谷深形成相对封闭环境','交通便利','气候宜人','经济发达'],a:0,e:'形复杂山高谷深。\n\n各民族文化独立发展，没有哪个民族是云南"土著"——都是不同时期迁入的。},{q:'我国首艘大洋钻探船被命名为？',o:['梦想号','探索号','奋进号','科学号'],a:0,e:'想号。\n\n2024入列钻探11000米。},{q:'光刻机是芯片制造的核心设备。我国自主研发的深紫外光刻机可生产多少纳米芯片？',o:['28nm','14nm','7nm','5nm'],a:0,e:'8nm。\n\n上海微电子量产28nm。14nm需EUV光刻机。},{q:'我国自主研发的C919大型客机属于？',o:['干线客机','支线客机','运输机','公务机'],a:0,e:'线客机。\n\nC919窄体150-190座。},{q:'我国成功发射的第一颗人造地球卫星是？',o:['东方红一号','神舟一号','嫦娥一号','天宫一号'],a:0,e:'方红一号。\n\n1970年4月24日中国航天日。},{q:'世界上最大的水利枢纽工程是？',o:['三峡工程','白鹤滩水电站','溪洛渡水电站','向家坝水电站'],a:0,e:'峡工程。\n\n长2309米高185米。白鹤滩第二。},{q:'京杭大运河贯通的水系不包括？',o:['珠江','海河','黄河','长江'],a:0,e:'江。\n\n京杭大运河贯穿海黄淮长钱五大水系。},{q:'四大发明中哪一项最早出现？',o:['造纸术','印刷术','火药','指南针'],a:0,e:'纸术。\n\n西汉已有东汉蔡伦改进。最早。},{q:'我国最大的咸水湖是？',o:['青海湖','鄱阳湖','洞庭湖','太湖'],a:0,e:'海湖。\n\n4626km最大咸水湖。},{q:'我国最新型运载火箭长征十号主要用于？',o:['载人月球探测','卫星发射','空间站建设','深空探测'],a:0,e:'人月球探测。\n\n长征十号2024试飞。}]);
rQ('言语理解',[
{q:'云南是野生菌的天堂，每年6月至10月的雨季，各类野生菌在山林间破土而出。据统计，云南野生菌种类占全国的80%以上，产量占全国的70%以上。然而，每年也都有因误食有毒菌类而中毒的事件发生。填入画横线部分最恰当的一组成语是：云南野生菌种类之丰富令人____，但食用也需____。（2024云南定向选调·改编）',o:['叹为观止+小心翼翼','目眩神迷+如履薄冰','叹为观止+如履薄冰','目眩神迷+小心翼翼'],a:0,e:'为观止+小心翼翼。\n\n"叹为观止"出自《左传》，赞美之词；"小心翼翼"出自《诗经》，形容谨慎。"如履薄冰"强调危险感而非谨慎感。},
{q:'中老铁路北起云南昆明，南至老挝首都万象，全长1035公里，设计时速160公里。这条铁路的开通运营，使老挝从"陆锁国"变为"陆联国"，同时也为云南打通了面向东南亚的陆路大通道。这段文字的主旨是？（2023云南公考行测·原题）',o:['中老铁路改善了沿线交通条件','中老铁路促进了区域经济一体化','中老铁路推动了农产品出口','中老铁路开辟了机电产品新市场'],a:1,e:'域经济一体化。\n\n"不仅...更是..."递进结构，"更是"后的"经济走廊"才是真正的主旨。主旨题口诀：递进之后是重点。},
{q:'将以下五个句子重新排列，最连贯的一项是：①云南是世界茶树原产地之一，拥有大量古茶树资源。②普洱茶以其独特的风味和保健功效享誉海内外。③茶马古道因此兴盛了数百年，成为连接云南与西藏、内地的重要商贸通道。④这里的古茶树群落证明着云南悠久的茶文化历史，最古老的树龄已达3200年。⑤茶叶贸易不仅促进了经济发展，也推动了文化交流与民族融合。（2024国考·改编）',o:['①④②③⑤','②①④③⑤','①④③②⑤','③①④②⑤'],a:0,e:'④②③⑤。\n\n首句①引出云南是世界茶源→④古茶树证据→②普洱茶代表→③茶马古道兴盛→⑤升华意义。排序技巧：首句引入话题，尾句总结升华。},
{q:'云南地处低纬度高原，地形地貌复杂多样，海拔高差悬殊，从最低点的河口县76米到最高点的梅里雪山6740米，巨大的垂直高差造就了云南独特的气候特征。填入画横线部分最恰当的一项是：云南生物多样性极为丰富，高等植物占全国一半以上，因此被誉为____。（2024云南定向选调·改编）',o:['气候宜人的省份','动植物王国','少数民族最多的省份','面积广阔的边疆省份'],a:1,e:'植物王国。\n\n前句"生物多样性极为丰富，高等植物占全国一半以上"直接呼�的"动植物王国"。其他选项均无法与"生物多样性"形成因果关系。},
{q:'阅读下文，回答以下问题：云南花卉产业经过多年发展，已形成以鲜切花、盆花、绿化观赏苗木为主的产业体系。全省花卉种植面积达190余万亩，花卉企业超过3000家。目前云南花卉已占全国70%以上的市场份额，出口到50多个国家和地区。但与此同时，物流成本高、保鲜技术不足、品牌附加值低等问题仍然是制约产业进一步发展的瓶颈。以下哪项与原文内容不符？（2023国考题·原题）',o:['云南花卉产业在全国占主导地位','物流成本高是产业发展短板','云南花卉产业发展已经没有任何瓶颈','保鲜技术还需要进一步提升'],a:2,e:'有发展瓶颈。\n\n原文明确说"物流成本高、保鲜技术不足、品牌附加值低等是制约瓶颈"，因此"没有任何瓶颈"与原文明显矛盾。细节题注意"无中生有"型错误。},
{q:'填入画横线部分最恰当的关联词是：近年来云南咖啡产业发展迅速，种植面积从2015年的不足100万亩____增长到2025年的约180万亩，咖啡豆产量也从2015年的约8万吨____增长到2025年的约15万吨。云南咖啡正逐渐从"原料供应商"向"品牌化发展"转型。（2024国考·改编）',o:['但是 但是','分别 分别','首先 其次','不仅 而且'],a:1,e:'别。\n\n"从...到..."引出两个时间段的数据对比，用"分别"引出两个数据。并列结构不需要转折或递进关联词。},
{q:'下列各句中加点成语使用恰当的一项是？（2024云南定向选调·原题）',o:['每到野生菌上市季节，山里的蘑菇俯拾即是，当地村民很快就能捡满一筐。','国庆期间大理古城游人如织，但平时门可罗雀，游客稀少。','站在西双版纳热带雨林中放眼望去，一望无际的雨林尽收眼底。','云南25个世居少数民族各具特色的文化传统，共同构成了绚丽多彩的民族文化画卷。'],a:3,e:'具特色。\n\nA"俯拾即是"形容东西多且弯腰就能捡到，但野生菌需要上山寻找并非俯拾即是；B"门可罗雀"形容冷清，与"游人如织"矛盾；C"一望无际"用于平坦开阔地域，雨林有树木遮挡不适用。}

{q:'阅读文段回答问题：文化自信是一个国家、一个民族发展中更基本、更深沉、更持久的力量。没有高度的文化自信就没有中华民族伟大复兴。坚定文化自信必须坚持马克思主义指导地位守正创新。这段文字的核心观点是？',o:['文化自信是中华民族伟大复兴的重要支撑','文化自信不需要马克思主义指导','文化自信只与传统文化有关','文化自信与创新无关'],a:0,e:'化自信是复兴重要支撑。\n\n首尾呼应主旨题。},
{q:'云南普洱茶历史悠久但市场上鱼龙混杂。一些商家以次充好甚至用其他茶叶冒充普洱茶。这不仅损害了消费者权益也严重影响了云南普洱茶的声誉。因此必须加强市场监管建立普洱茶溯源体系。这段文字主要想表达的是？',o:['普洱茶市场存在乱象需要加强监管','普洱茶历史悠久','消费者权益受损','普洱茶应建立品牌'],a:0,e:'洱茶需加强监管。\n\n转折后是重点问题+对策。},
{q:'生态文明建设是关系中华民族永续发展的根本大计。党的十八大以来党中央以前所未有的力度抓生态文明建设推动生态环境保护发生了历史性转折性全局性变化。填入画横线部分最恰当的是：要以____的决心打好污染防治攻坚战。',o:['壮士断腕','优柔寡断','犹豫不决','患得患失'],a:0,e:'士断腕。\n\n大决心。其他三个负面排除。},
{q:'放眼世界各国的现代化进程没有任何一个民族能够通过亦步亦趋模仿别人实现振兴。中国式现代化之所以能够取得历史性成就就在于走出了一条适合自己国情的发展道路。这段文字意在强调？',o:['中国式现代化走的是自主创新道路','模仿别人也能实现现代化','各国现代化道路相同','中国式现代化不如西方'],a:0,e:'国式现代化走自主创新。\n\n"没有民族靠模仿"是核心。},
{q:'将以下句子排序：①湿地被誉为地球之肾。②我国湿地面积5635万公顷居亚洲第一世界第四。③湿地具有涵养水源净化水质调节气候维护生物多样性等功能。④保护湿地就是保护我们的家园。',o:['①②③④','①③②④','②①③④','③①②④'],a:1,e:'324。\n\n总起地位+具体功能+数据+呼吁。},
{q:'一项调查显示云南省博物馆2024年接待观众数量突破500万人次创历史新高。其中35岁以下青年观众占比超过60%成为绝对主力。越来越多年轻人走进博物馆这说明？',o:['年轻人对中华优秀传统文化的认同感和兴趣日益增强','博物馆门票太便宜','年轻人没有其他娱乐方式','博物馆设施越来越先进'],a:0,e:'轻人文化认同增强。\n\n数据支撑文化自信。},
