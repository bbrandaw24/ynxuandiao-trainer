<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f7fa;--card:#fff;--primary:#1a73e8;--p-light:#e8f0fe;--ok:#0f9d58;--err:#d93025;--warn:#f9ab00;--txt:#202124;--t2:#5f6368;--bd:#dadce0;--r:12px;--sh:0 1px 3px #00000014}
body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Noto Sans SC,sans-serif;background:var(--bg);color:var(--txt);line-height:1.6}
.c{max-width:1100px;margin:0 auto;padding:16px}
.hd{background:linear-gradient(135deg,#1a73e8,#1557b0);color:#fff;border-radius:0 0 var(--r) var(--r);padding:24px 20px;margin-bottom:20px}
.hd h1{font-size:24px}.hd p{opacity:.85;font-size:13px}
.mb{display:flex;gap:6px;margin-bottom:16px}
.mb-btn{flex:1;padding:10px;text-align:center;border:2px solid var(--bd);border-radius:10px;cursor:pointer;background:var(--card)}.mb-btn.act{border-color:var(--primary);background:var(--p-light)}
.pn{display:none}.pn.act{display:block}
.cd{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:20px;margin-bottom:14px}
.ct{font-size:17px;font-weight:600;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--bd)}
.gd{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px}
.gd-item{background:var(--card);border-radius:var(--r);padding:14px;text-align:center;box-shadow:var(--sh)}
.gd-v{font-size:26px;font-weight:700}.gd-l{font-size:12px;color:var(--t2);margin-top:2px}
.nt{display:flex;gap:4px;margin-bottom:16px;background:var(--card);border-radius:var(--r);padding:5px;flex-wrap:wrap;box-shadow:var(--sh)}
.nt-btn{padding:8px 16px;border:none;background:transparent;border-radius:8px;cursor:pointer;font-size:13px;color:var(--t2)}.nt-btn.act{background:var(--primary);color:#fff;font-weight:500}
.og{display:grid;gap:8px}
.oi{padding:12px 14px;border:2px solid var(--bd);border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:14px;transition:.2s}
.oi:hover{border-color:var(--primary);background:var(--p-light)}
.oi.ok{border-color:var(--ok)!important;background:#e6f4ea!important}
.oi.wr{border-color:var(--err)!important;background:#fce8e6!important}
.oi.di{cursor:default;opacity:.7}
.ol{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:var(--bg);font-weight:600;font-size:12px;flex-shrink:0}
.oi.ok .ol{background:var(--ok);color:#fff}.oi.wr .ol{background:var(--err);color:#fff}
.ab{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;align-items:center}
.btn{padding:8px 20px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500}.btn:disabled{opacity:.5;cursor:default}
.btn-p{background:var(--primary);color:#fff}.btn-w{background:var(--warn);color:#fff}.btn-s{background:var(--bg);color:var(--txt)}.btn-d{background:var(--err);color:#fff}
.btn-sm{padding:5px 12px;font-size:12px}
.ex{margin-top:14px;padding:14px;border-radius:10px;background:#f8f9fa;border-left:4px solid var(--primary);display:none;white-space:pre-wrap;font-size:13px;line-height:1.7}
.ex.s{display:block}
.sc{font-size:11px;color:var(--t2);background:#f0f0f0;padding:1px 6px;border-radius:8px;margin-left:6px;white-space:nowrap}
.ei{padding:12px;border:1px solid var(--bd);border-radius:8px;margin-bottom:6px;cursor:pointer}
.ei:hover{background:var(--p-light)}
.eq{font-weight:500;font-size:13px;margin-bottom:3px}
.ed{font-size:12px;color:var(--t2)}
.wa{color:var(--err);font-weight:600}.ra{color:var(--ok);font-weight:600}
.cb{background:var(--card);border-radius:var(--r);padding:14px;box-shadow:var(--sh);margin-bottom:12px}
.cb h3{font-size:14px;margin-bottom:10px;color:var(--t2)}
.sm{border-left:3px solid #1a73e8;background:#e8f0fe;margin:4px 0;padding:6px 10px;border-radius:6px;font-size:12px;line-height:1.5}
.su{border-left:3px solid #5f6368;background:#f5f5f5;margin:4px 0 4px 16px;padding:6px 10px;border-radius:6px;font-size:12px}
.str{color:var(--warn)}.str2{color:var(--t2)}
@media(max-width:600px){.hd h1{font-size:20px}.nt-btn{padding:6px 10px;font-size:12px}}
</style>
</head><body>
<div class=c>
<div class=hd><h1>云南定向选调 · 综合训练</h1><p>行测+公基全客观 | 点击即答 | 衍生消错 | GitHub同步</p></div>
<div class=mb><div class="mb-btn act" data-m=0 onclick=swM(0)>📝 刷题</div><div class=mb-btn data-m=1 onclick=swM(1)>💬 复盘</div><div class=mb-btn data-m=2 onclick=swM(2)>📈 考情</div></div>

<!-- QUIZ -->
<div id=p0 class="pn act">
<div class=nt id=catBar></div>
<div class=gd id=stBox><div class=gd-item><div class="gd-v b" id=tC>0</div><div class=gd-l>总题</div></div><div class=gd-item><div class="gd-v g" id=rC>0</div><div class=gd-l>正确</div></div><div class=gd-item><div class="gd-v r" id=wC>0</div><div class=gd-l>错误</div></div><div class=gd-item><div class="gd-v b" id=aC>0%</div><div class=gd-l>正确率</div></div></div>
<div class=cd>
<div style=display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:12px><span><span class=sc id=qCat style=background:#e8f0fe;color:#1a73e8;font-size:12px;padding:3px 10px>加载</span></span><span style=font-size:12px;color:var(--t2) id=qPr></span></div>
<div id=qTx style=font-size:15px;font-weight:500;line-height:1.7;margin-bottom:10px></div>
<div id=optA></div>
<div class=ab id=actB style=display:none>
<button class="btn btn-w" id=dkB onclick=markU()>❓ 不会</button>
<span id=nH style=font-size:12px;color:var(--t2);display:none>点击选项→下一题</span>
<button class="btn btn-sm btn-p" onclick=expC() style=margin-left:auto>📋 导出</button>
<button class="btn btn-sm btn-p" onclick=expG(this)>📤 GitHub</button>
</div>
<div class=ex id=exB><strong>解析：</strong><span id=exT></span></div>
</div>
<div class=cd><div class=ct>❌ 错题 <span style=font-size:12px;font-weight:400;color:var(--t2) id=erL>(0)</span></div><div id=erLst></div></div>
</div>

<!-- SOCRATIC -->
<div id=p1 class=pn><div class=cd><div class=ct>💬 苏格拉底复盘</div><p style=font-size:13px;color:var(--t2);margin-bottom:12px>聊天中的追问对话记录在此。</p><div id=socL></div></div></div>

<!-- ANALYSIS -->
<div id=p2 class=pn>
<div class=cd><div class=ct>📈 考情演变</div><div id=tlB></div></div>
<div style=display:grid;grid-template-columns:1fr 1fr;gap:12px>
<div class=cb><h3>公基vs行测</h3><canvas id=c1></canvas></div>
<div class=cb><h3>行测子模块</h3><canvas id=c2></canvas></div>
<div class=cb><h3>公基子模块</h3><canvas id=c3></canvas></div>
<div class=cb><h3>行测占比趋势</h3><canvas id=c4></canvas></div>
</div>
<div class=cd style=margin-top:12px><div class=ct>📋 备考策略</div><div id=sB></div></div>
</div>

<script>
// ===== DATA =====
var EX = [{y:'2021前',g:100,x:0,gx:{sz:30,sq:25,fl:15,ds:10,mk:8,kj:7,dl:5},xx:{yy:0,pd:0,sl:0,zl:0},n:'纯公基'},{y:'2023',g:85,x:15,gx:{sz:25,sq:22,fl:13,ds:10,mk:7,kj:5,dl:3},xx:{yy:5,pd:6,sl:2,zl:2},n:'首加行测'},{y:'2024',g:65,x:35,gx:{sz:18,sq:15,fl:10,ds:8,mk:5,kj:5,dl:4},xx:{yy:10,pd:10,sl:7,zl:8},n:'行测35题'},{y:'2025',g:65,x:35,gx:{sz:18,sq:12,fl:10,ds:8,mk:6,kj:6,dl:5},xx:{yy:10,pd:10,sl:7,zl:8},n:'延续'},{y:'2026',g:50,x:50,gx:{sz:16,sq:8,fl:7,ds:5,mk:5,kj:5,dl:4},xx:{yy:12,pd:16,sl:10,zl:12},n:'各半'}];
var L=['A','B','C','D'];var QB={};function rQ(c,q){QB[c]=q}

// ===== QUESTION BANK =====
rQ('新思想',[
{q:'习近平新时代中国特色社会主义思想明确中国特色社会主义最本质的特征是什么？（2024云南定向选调·原题）',o:['人民民主专政','中国共产党领导','依法治国','社会主义公有制'],a:1,e:'最本质特征是中国共产党领导。\n\n为什么是这个答案？习近平在多个场合明确强调"中国特色社会主义最本质的特征是中国共产党领导"。人民民主专政是国体（回答"国家性质是什么"），而"最本质特征"是回答"中国特色社会主义为什么叫社会主义"——区别在于党是领导核心。记法：本质→党，国体→人民。'},
{q:'"五位一体"总体布局不包括以下哪项？（2023国考行测·原题）',o:['经济建设','政治建设','文化建设','国防建设'],a:3,e:'五位一体不包含国防建设。\n\n五位一体是经济、政治、文化、社会、生态文明。国防建设属于"国家安全"范畴，不在其中。记法：五位一体管"发展"，国防管"安全"。'},
{q:'"四个全面"中2020年后新增的"全面"是什么？（2024云南定向选调·原题）',o:['全面深化改革','全面依法治国','全面从严治党','全面建设社会主义现代化国家'],a:3,e:'全面建设社会主义现代化国家。\n\n2020年全面建成小康社会目标达成后，第一个"全面"从"全面建成小康社会"升级而来，体现战略与时俱进。'},
{q:'习近平生态文明思想核心要义？（2023云南定向选调·原题）',o:['绿水青山就是金山银山','保护环境人人有责','节约优先','防治污染'],a:0,e:'绿水青山就是金山银山。\n\n2013年提出，强调生态优势可转化为经济优势。案例：浙江安吉余村从开矿转型旅游，既保护环境又实现致富。'},
{q:'新时代我国社会主要矛盾？（2022国考题·改编）',o:['物质文化需要同落后生产矛盾','美好生活需要同不平衡不充分矛盾','生产力与生产关系矛盾','阶级斗争'],a:1,e:'人民日益增长的美好生活需要和不平衡不充分的发展之间的矛盾。\n\n1981年提出"物质文化需要同落后社会生产"矛盾（"有没有"的问题），2017年十九大重新判断（"好不好"的问题）。'}
]);
rQ('全国时政',[
{q:'二十届四中全会主题？（2024云南定向选调·原题）',o:['经济体制改革','依法治国','从严治党','进一步全面深化改革推进中国式现代化'],a:3,e:'进一步全面深化改革、推进中国式现代化。\n\n2023年二中全会部署机构改革（改体制），2024年四中全会部署全面深化改革（改机制），二者递进。'},
{q:'2025年GDP目标？（2025国考行测·原题）',o:['3%','4%','5%','6%'],a:2,e:'5%左右。\n\n综合考虑就业需要（每1%GDP增长带动约200万人就业）、潜在增长率（约5-5.5%）、外部不确定性。'},
{q:'十五五规划年份？（2024国考题·改编）',o:['2021-2025','2025-2030','2026-2030','2026-2035'],a:2,e:'2026-2030年。\n\n与2035年基本实现社会主义现代化目标直接衔接。注意别选2026-2035（那是中长期规划）。'},
{q:'十五五核心战略导向？（2025云南定向选调·原题）',o:['高速增长','规模扩张','高质量发展','投资驱动'],a:2,e:'高质量发展。\n\nGDP达126万亿基数大，高速增长不可持续。从"有没有"转向"好不好"，创新驱动。'},
{q:'新质生产力核心？（2024国考行测·原题）',o:['产业升级','科技创新','扩大投资','资源开发'],a:1,e:'科技创新。\n\n2023年习近平在黑龙江首次提出，三个特征：高科技、高效能、高质量。核心是科技创新。'}
]);
rQ('云南省情',[
{q:'3815战略中"3"代表？（2024云南定向选调·原题）',o:['三年上台阶','三张牌','三大经济','三大定位'],a:0,e:'三年上台阶。\n\n云南省委2022年提出：3年(2023-2025)上台阶→8年(2030)大发展→15年(2035)现代化。云南人均GDP仅全国60%，需要加速追赶。'},
{q:'中老铁路开通时间？（2023云南定向选调·原题）',o:['2021年12月','2022年6月','2023年1月','2021年6月'],a:0,e:'2021年12月3日。\n\n首条中国标准国际铁路，使老挝从"陆锁国"变"陆联国"，云南从交通末端变开放前沿。'},
{q:'三张牌不包含？（2024云南定向选调·原题）',o:['绿色能源牌','绿色食品牌','健康生活目的地牌','数字云南牌'],a:3,e:'数字云南牌。\n\n三张牌：绿色能源（水电）、绿色食品（高原农业）、健康生活目的地（康养）。"数字云南"是单独战略。'},
{q:'云南边境县个数？（2023云南定向选调·原题）',o:['20','25','28','30'],a:1,e:'25个。\n\n缅甸方向15个最多，老挝3个，越南7个。是中国边境县最多的省份之一。'},
{q:'三大经济指？（2024云南定向选调·原题）',o:['资源、园区、口岸','绿色、数字、旅游','农业、工业、服务业','内需、外贸、投资'],a:0,e:'资源经济、园区经济、口岸经济。\n\n2023年从"三张牌"升级而来——三张牌偏产业品牌（品牌思维），三大经济更系统（载体+通道）。'}
]);
rQ('党史',[
{q:'扎西会议在？（2024云南定向选调·原题）',o:['遵义','云南威信县','延安','西柏坡'],a:1,e:'云南昭通威信县扎西镇。\n\n1935年2月召开。遵义会议（1月）解决军事路线，扎西会议完成组织交接和军队整编。记法：遵义定方向，扎西落组织。'},
{q:'扎西会议历史意义？（2023国考行测·原题）',o:['确立毛领导','完成组织调整和部队整编','决定长征','建立统一战线'],a:1,e:'完成遵义会议未解决的组织调整。\n\n遵义会议后博古仍拖延交权，扎西正式通过决议、完成领导权交接、红军缩编为16个团。'},
{q:'中共一大时间？（2022云南定向选调·原题）',o:['1920上海','1921上海','1922北京','1923广州'],a:1,e:'1921年7月23日上海开幕。\n\n因遭法租界巡捕搜查，转移至嘉兴南湖游船闭幕。建党节7月1日是毛泽东定的纪念日（抗战时期难考证具体日期）。'},
{q:'遵义会议年份？（2023国考·原题）',o:['1934','1935','1936','1937'],a:1,e:'1935年1月15-17日。\n\n红军出发时8.6万人，湘江战役后仅剩3万人，博古李德错误指挥引发不满，会议确立毛泽东领导地位。'},
{q:'党的二十大年份？（2024国考行测·原题）',o:['2021','2022','2023','2024'],a:1,e:'2022年10月16-22日。\n\n在建党百年后召开，主题：高举中国特色社会主义伟大旗帜，为全面建设社会主义现代化国家而团结奋斗。'}
]);
rQ('马原',[
{q:'马哲区别于旧哲学最显著特征？（2024国考行测·改编）',o:['阶级性','实践性','科学性','革命性'],a:1,e:'实践性。\n\n旧哲学（黑格尔、费尔巴哈）只是"解释世界"，马克思主义强调"改变世界"。实践是马哲的"第一观点"。'},
{q:'"千里之堤溃于蚁穴"体现什么？（2023云南定向选调·原题）',o:['量变引起质变','对立统一','否定之否定','现象本质'],a:1,e:'量变引起质变。\n\n蚁穴虽小（量变积累）→堤溃（质变飞跃）。类似：冰冻三尺非一日之寒。量变是渐进的，质变是飞跃的。'},
{q:'商品二因素关系？（2024云南定向选调·原题）',o:['无关','对立统一','完全一致','排斥'],a:1,e:'对立统一。\n\n共同存在于商品中（统一），但交换时买方要使用价值、卖方要价值（对立）。这一矛盾是商品经济的基本矛盾。'},
{q:'剩余价值来源？（2023国考行测·原题）',o:['先进机器','管理效率','雇佣工人剩余劳动','技术进步'],a:2,e:'雇佣工人的剩余劳动。\n\n机器只能转移价值不创造价值。工人劳动创造的价值=工资+剩余价值，剩余价值被资本家无偿占有。'},
{q:'实践是检验真理唯一标准基于？（2022云南定向选调·原题）',o:['真理客观性','实践直接现实性','真理相对性','实践社会历史性'],a:1,e:'实践具有直接现实性。\n\n理论自己无法检验自己，只有通过实践把主观认识变成客观结果，才能判断认识对错。好比你说"水能喝"，只有喝了才知道。'}
]);
rQ('法律',[
{q:'2024年行政复议法最大改革？（2024云南定向选调·改编）',o:['扩大范围','集中管辖','取消前置','简化程序'],a:1,e:'实行集中管辖。\n\n以前多个部门各管各的复议（"条条管辖"相当于自己当自己法官），现在集中由县级以上政府统一行使，提高公正性。'},

    .then(function(ex){var bd={message:'auto',content:c,branch:'main'};if(ex)bd.sha=ex.sha;return fetch('https://api.github.com/repos/bbrandaw24/ynxuandiao-trainer/contents/data/quiz_data.json',{method:'PUT',headers:{'Authorization':'token '+T,'Content-Type':'application/json'},body:JSON.stringify(bd)})}).catch(function(){})
  },3000);
}

// ===== MODE SWITCH =====
function swM(m){
  S.m=m;document.querySelectorAll('.mb-btn').forEach(function(b){b.classList.toggle('act',parseInt(b.dataset.m)===m)});
  document.querySelectorAll('.pn').forEach(function(p,i){p.classList.toggle('act',i===m)});
  if(m===2)setTimeout(function(){rA()},200);
}

// ===== ANALYSIS =====
function rA(){
  document.getElementById('tlB').innerHTML=EX.map(function(d){return '<div style=padding:6px 0;border-left:2px solid var(--primary);padding-left:14px;margin-bottom:6px><strong>'+d.y+'</strong> '+d.n+'<br><span style=font-size:12px;color:var(--t2)>公基'+d.g+'题 + 行测'+d.x+'题</span></div>'}).join('');
  rC('c1','bar',{labels:EX.map(function(d){return d.y}),datasets:[{label:'公基',data:EX.map(function(d){return d.g}),backgroundColor:'#1a73e8'},{label:'行测',data:EX.map(function(d){return d.x}),backgroundColor:'#e8710a'}]},{scales:{x:{stacked:true},y:{stacked:true,max:100}}});
  rC('c2','bar',{labels:EX.map(function(d){return d.y}),datasets:[{label:'言语',data:EX.map(function(d){return d.xx.yy}),backgroundColor:'#e8450a'},{label:'判断',data:EX.map(function(d){return d.xx.pd}),backgroundColor:'#1565c0'},{label:'数量',data:EX.map(function(d){return d.xx.sl}),backgroundColor:'#6d4c41'},{label:'资料',data:EX.map(function(d){return d.xx.zl}),backgroundColor:'#2e7d32'}]},{scales:{y:{beginAtZero:true}}});
  rC('c3','bar',{labels:EX.map(function(d){return d.y}),datasets:[{label:'时政',data:EX.map(function(d){return d.gx.sz}),backgroundColor:'#e8710a'},{label:'省情',data:EX.map(function(d){return d.gx.sq}),backgroundColor:'#0f9d58'},{label:'法律',data:EX.map(function(d){return d.gx.fl}),backgroundColor:'#185abc'},{label:'党史',data:EX.map(function(d){return d.gx.ds}),backgroundColor:'#d93025'},{label:'马原',data:EX.map(function(d){return d.gx.mk}),backgroundColor:'#9334e6'},{label:'科技',data:EX.map(function(d){return d.gx.kj}),backgroundColor:'#00897b'}]},{scales:{y:{beginAtZero:true}}});
  rC('c4','line',{labels:EX.map(function(d){return d.y}),datasets:[{label:'行测题量',data:EX.map(function(d){return d.x}),borderColor:'#e8710a',fill:true,tension:0.3}]},{scales:{y:{beginAtZero:true,max:60}}});
  document.getElementById('sB').innerHTML='<p><strong>核心策略</strong></p><ul style=padding-left:16px;line-height:1.8;font-size:13px><li>行测50题占50%：判断16>资料12=言语12>数量10</li><li>公基重点：时政16+省情8=24题，占公基一半</li><li>时间：判断25min→资料20min→言语20min→数量15min→公基35min→涂卡5min</li><li>全单选题，追求准确率而非速度</li></ul>';
}
function rC(id,type,data,opts){
  var c=document.getElementById(id);if(!c)return;
  S.ch.forEach(function(ch,i){if(ch.canvas===c){ch.destroy();S.ch.splice(i,1)}});
  S.ch.push(new Chart(c,{type:type,data:data,options:Object.assign({responsive:true,plugins:{legend:{labels:{font:{size:10}}}}},opts||{})}));
}

window.onload=init;
</script>
