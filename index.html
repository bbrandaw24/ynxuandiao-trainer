<!DOCTYPE html>

<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>云南定向选调 · 综合训练系统</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>

<style>

*{margin:0;padding:0;box-sizing:border-box}

:root{--bg:#f5f7fa;--card:#fff;--primary:#1a73e8;--primary-light:#e8f0fe;--success:#0f9d58;--danger:#d93025;--warning:#f9ab00;--text:#202124;--text2:#5f6368;--border:#dadce0;--radius:12px;--shadow:0 1px 3px rgba(0,0,0,.08)}

body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif;background:var(--bg);color:var(--text);line-height:1.6}

.container{max-width:1200px;margin:0 auto;padding:20px}

.header{background:linear-gradient(135deg,#1a73e8,#1557b0);color:#fff;border-radius:0 0 var(--radius) var(--radius);padding:30px 20px;margin-bottom:24px}

.header h1{font-size:28px;margin-bottom:4px}.header p{opacity:.85;font-size:14px}

.nav-tabs{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap;background:var(--card);border-radius:var(--radius);padding:6px;box-shadow:var(--shadow)}

.nav-tab{padding:10px 18px;border:none;background:transparent;border-radius:8px;cursor:pointer;font-size:14px;color:var(--text2);transition:all .2s}

.nav-tab:hover{background:var(--primary-light);color:var(--primary)}

.nav-tab.active{background:var(--primary);color:#fff;font-weight:500}

.panel{display:none}.panel.active{display:block}

.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;margin-bottom:16px}

.card-title{font-size:18px;font-weight:600;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}

.stat-card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);text-align:center}

.stat-val{font-size:28px;font-weight:700}.stat-val.green{color:var(--success)}.stat-val.red{color:var(--danger)}.stat-val.blue{color:var(--primary)}

.stat-lbl{font-size:13px;color:var(--text2);margin-top:4px}

.options-grid{display:grid;gap:10px}

.option-item{padding:14px 16px;border:2px solid var(--border);border-radius:10px;cursor:pointer;transition:all .2s;font-size:15px;display:flex;align-items:center;gap:10px}

.option-item:hover{border-color:var(--primary);background:var(--primary-light)}

.option-item.correct{border-color:var(--success)!important;background:#e6f4ea!important}

.option-item.wrong{border-color:var(--danger)!important;background:#fce8e6!important}

.option-item.disabled{cursor:default;opacity:.7}

.opt-lbl{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:var(--bg);font-weight:600;font-size:13px;flex-shrink:0}

.option-item.correct .opt-lbl{background:var(--success);color:#fff!important}

.option-item.wrong .opt-lbl{background:var(--danger);color:#fff!important}

.action-bar{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;align-items:center}

.btn{padding:10px 24px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;transition:all .2s}

.btn-pri{background:var(--primary);color:#fff}.btn-pri:hover{background:#1557b0}

.btn-sec{background:var(--bg);color:var(--text)}.btn-sec:hover{background:var(--border)}

.btn-warn{background:var(--warning);color:#fff}.btn-warn:hover{background:#e09b00}

.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:#b3261e}

.btn-sm{padding:6px 14px;font-size:13px}

.btn:disabled{opacity:.5;cursor:not-allowed}

.expl-box{margin-top:16px;padding:16px;border-radius:10px;background:#f8f9fa;border-left:4px solid var(--primary);display:none}

.expl-box.show{display:block}

.src-tag{font-size:11px;color:#5f6368;background:#f0f0f0;padding:2px 8px;border-radius:10px;margin-left:8px;white-space:nowrap}

.error-item{padding:14px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;cursor:pointer;transition:all .2s}

.error-item:hover{background:var(--primary-light)}

.err-q{font-weight:500;font-size:14px;margin-bottom:4px}

.err-detail{font-size:13px;color:var(--text2)}

.wrong-ans{color:var(--danger);font-weight:600}.right-ans{color:var(--success);font-weight:600}

.cat-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500}

.chart-box{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:16px}

.chart-box h3{font-size:15px;margin-bottom:12px;color:var(--text2)}

.soc-entry{margin:6px 0;padding:8px 12px;border-radius:8px;font-size:13px;line-height:1.6}

.soc-ai{background:#e8f0fe;border-left:3px solid #1a73e8}

.soc-user{background:#f5f5f5;border-left:3px solid #5f6368;margin-left:20px}

.mode-bar{display:flex;gap:8px;margin-bottom:20px}

.mode-btn{flex:1;padding:12px;text-align:center;border:2px solid var(--border);border-radius:10px;cursor:pointer;background:var(--card);transition:all .2s}

.mode-btn.active{border-color:var(--primary);background:var(--primary-light)}

.mode-btn-icon{font-size:24px}.mode-btn-lbl{font-size:13px;font-weight:500}

.prog-star{color:var(--warning)}

@media(max-width:600px){.header h1{font-size:22px}.nav-tab{padding:8px 12px;font-size:13px}}

</style>

</head>

<body>

<div class=container>

<div class=header>

<h1>云南定向选调 · 综合训练系统</h1>

<p>行测+公基全客观题模拟 | 点击即答 | 错题衍生消去 | GitHub实时同步</p>

</div>



<div class=mode-bar>

<div class="mode-btn active" data-mode=quiz onclick="switchMode('quiz')"><div class=mode-btn-icon>📝</div><div class=mode-btn-lbl>刷题</div></div>

<div class=mode-btn data-mode=review onclick="switchMode('review')"><div class=mode-btn-icon>💬</div><div class=mode-btn-lbl>苏格拉底复盘</div></div>

<div class=mode-btn data-mode=analysis onclick="switchMode('analysis')"><div class=mode-btn-icon>📈</div><div class=mode-btn-lbl>考情分析</div></div>

</div>



<!-- QUIZ PANEL -->

<div id=quizPanel class="panel active">

<div class=nav-tabs id=categoryTabs></div>

<div class=stats-grid id=statsGrid>

<div class=stat-card><div class="stat-val blue" id=totalCount>0</div><div class=stat-lbl>总题</div></div>

<div class=stat-card><div class="stat-val green" id=correctCount>0</div><div class=stat-lbl>正确</div></div>

<div class=stat-card><div class="stat-val red" id=wrongCount>0</div><div class=stat-lbl>错误</div></div>

<div class=stat-card><div class="stat-val blue" id=accuracyPct>0%</div><div class=stat-lbl>正确率</div></div>

</div>



<div class=card>

<div class=question-header style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:16px">

<span><span class=cat-badge id=qCat style="background:#e8f0fe;color:#1a73e8">加载中...</span></span>

<span style=font-size:13px;color:var(--text2) id=qProg></span>

</div>

<div id=qContent style=font-size:16px;font-weight:500;line-height:1.8;margin-bottom:12px></div>

<div id=optArea></div>

<div class=action-bar id=actionBar style=display:none>

<button class="btn btn-warn" id=dkBtn onclick=markUnknown()>❓ 不会</button>

<span id=nextHint style=font-size:13px;color:var(--text2);display:none>点击任意选项 → 下一题</span>

<button class="btn btn-sm btn-pri" onclick=exportClip() style=margin-left:auto>📋 导出</button>

        <button class="btn btn-sm btn-pri" onclick=exportGit(this)>📤 同步GitHub</button>

      </div>

<div class=expl-box id=explBox><strong>解析：</strong><span id=explText></span></div>

</div>



<div class=card>

<div class=card-title>❌ 错题本 <span style=font-size:13px;font-weight:400;color:var(--text2) id=errLabel>(0)</span></div>

<div id=errList><p style="color:var(--text2);text-align:center;padding:20px 0">暂无错题</p></div>

</div>

</div>



<!-- REVIEW PANEL -->

<div id=reviewPanel class=panel>

<div class=card>

<div class=card-title>💬 苏格拉底复盘 · 对话记录</div>

<p style=font-size:14px;color:var(--text2);margin-bottom:16px>你和我在聊天中的追问对话会记录在这里。</p>

<div id=socList><p style="color:var(--text2);text-align:center;padding:30px">暂无记录</p></div>

</div>

</div>



<!-- ANALYSIS PANEL -->

<div id=analysisPanel class=panel>

<div class=card><div class=card-title>📈 历年考情演变</div><div id=tlBox></div></div>

<div style=display:grid;grid-template-columns:1fr 1fr;gap:16px>

<div class=chart-box><h3>行测 vs 公基占比</h3><canvas id=ch1></canvas></div>

<div class=chart-box><h3>行测子模块题量</h3><canvas id=ch2></canvas></div>

<div class=chart-box><h3>公基子模块题量</h3><canvas id=ch3></canvas></div>

<div class=chart-box><h3>行测占比趋势</h3><canvas id=ch4></canvas></div>

</div>

<div class=card style=margin-top:16px><div class=card-title>📋 备考策略</div><div id=stratBox></div></div>

</div>

</div>



<script>

// ===== DATA =====

const EXAMS = [

  {y:'2021前',g:100,x:0,gd:{sz:30,sq:25,fl:15,ds:10,mk:8,kj:7,dl:5},xd:{yy:0,pd:0,sl:0,zl:0},n:'纯公基'},

  {y:'2023',g:85,x:15,gd:{sz:25,sq:22,fl:13,ds:10,mk:7,kj:5,dl:3},xd:{yy:5,pd:6,sl:2,zl:2},n:'首加行测'},

  {y:'2024',g:65,x:35,gd:{sz:18,sq:15,fl:10,ds:8,mk:5,kj:5,dl:4},xd:{yy:10,pd:10,sl:7,zl:8},n:'行测扩至35'},

  {y:'2025',g:65,x:35,gd:{sz:18,sq:12,fl:10,ds:8,mk:6,kj:6,dl:5},xd:{yy:10,pd:10,sl:7,zl:8},n:'延续'},

  {y:'2026',g:50,x:50,gd:{sz:16,sq:8,fl:7,ds:5,mk:5,kj:5,dl:4},xd:{yy:12,pd:16,sl:10,zl:12},n:'公基行测各半'}

];

const L=['A','B','C','D'];



// ===== QUESTION BANK =====

const QB={};

function regQ(c,qs){QB[c]=qs}

// Helper

regQ('新思想',[

{q:'习近平新时代中国特色社会主义思想明确中国特色社会主义最本质的特征是什么？（2024云南定向选调·原题）',o:['人民民主专政','中国共产党领导','依法治国','社会主义公有制'],a:1,e:'最本质特征是中国共产党领导，而非人民民主专政。

为什么是这个答案？习近平在多个场合明确强调"中国特色社会主义最本质的特征是中国共产党领导"。人民民主专政是国体（回答"国家性质是什么"），而"最本质特征"是回答"中国特色社会主义为什么叫社会主义"——区别在于党是领导核心。记法：本质→党，国体→人民。'},

{q:'"五位一体"总体布局不包括以下哪项？（2023国考行测·原题）',o:['经济建设','政治建设','文化建设','国防建设'],a:3,e:'五位一体不包含国防建设。

为什么？五位一体是经济、政治、文化、社会、生态文明五个维度的"建设"——覆盖了现代化建设的全部领域。国防建设属于"国家安全"范畴，与五位一体中的"政治建设"有交叉但不被包含。记法：五位一体管"发展"，国防管"安全"。'},

{q:'"四个全面"中2020年后新增的"全面"是什么？（2024云南定向选调·原题）',o:['全面深化改革','全面依法治国','全面从严治党','全面建设社会主义现代化国家'],a:3,e:'2020年后新增的是"全面建设社会主义现代化国家"。

背景：2020年全面建成小康社会的第一个百年目标完成后，党中央将"四个全面"中的"全面建成小康社会"升级为"全面建设社会主义现代化国家"，体现了战略部署与时俱进。'},

{q:'习近平生态文明思想核心要义？（2023云南定向选调·原题）',o:['绿水青山就是金山银山','保护环境人人有责','节约优先','防治污染'],a:0,e:'绿水青山就是金山银山。

这是习近平2013年提出的核心理念，强调生态优势可以转化为经济优势。典型案例：浙江安吉余村从开矿污染转型发展旅游，既保护了绿水青山又实现了致富——这个案例多次出现在公考材料中。'},

{q:'新时代我国社会主要矛盾？（2022国考题·改编）',o:['物质文化需要同落后生产矛盾','美好生活需要同不平衡不充分矛盾','生产力与生产关系矛盾','阶级斗争'],a:1,e:'人民日益增长的美好生活需要和不平衡不充分的发展之间的矛盾。

背景：1981年十一届六中全会提出"人民日益增长的物质文化需要同落后的社会生产之间的矛盾"——那个时代是"有没有"的问题。2017年十九大重新判断为"美好生活需要"——现在是"好不好"的问题。'},

{q:'人类命运共同体核心？（2024云南定向选调·原题）',o:['互相制裁','以邻为壑','合作共赢','武力威慑'],a:2,e:'合作共赢。

背景：2013年习近平在莫斯科国际关系学院首次提出人类命运共同体理念。核心主张是各国利益交融、安危与共，与冷战思维的零和博弈截然不同。该理念已写入联合国决议。'},

{q:'"一带一路"中"一带"指？（2023国考行测·原题）',o:['海上丝绸之路','丝绸之路经济带','中巴经济走廊','亚洲公路网'],a:1,e:'丝绸之路经济带。

"一带一路"是"丝绸之路经济带"（一带，陆上）和"21世纪海上丝绸之路"（一路，海上）的合称。2013年习近平在哈萨克斯坦和印尼分别提出，覆盖亚欧非三大洲。'},

{q:'新发展理念中解决动力问题的是？（2024云南定向选调·原题）',o:['协调','绿色','开放','创新'],a:3,e:'创新。

为什么会选错？很多人看到"开放"以为是对外开放解决发展问题。实际上五大理念分工：创新→动力、协调→平衡、绿色→人与自然、开放→内外联动、共享→公平。创新排第一，因为"创新是引领发展的第一动力"。'},

{q:'强军目标是什么？（2023国考·改编）',o:['听党指挥、能打胜仗、作风优良','世界一流军队','科技强军','依法治军'],a:0,e:'听党指挥、能打胜仗、作风优良。

这是习近平在2017年十九大报告中明确的强军目标。对比：以前的口号是"政治合格、军事过硬、作风优良、纪律严明、保障有力"（五句话）。新目标更简洁聚焦。关键词：党指挥枪是军魂。'},

{q:'全过程人民民主本质？（2024云南定向选调·原题）',o:['人民当家作主','选举民主','协商民主','基层自治'],a:0,e:'人民当家作主。

全过程人民民主是习近平2019年提出的重要概念。与西方代议制民主的本质区别：西方民主主要是"投票时被想起、投完就被遗忘"的选举民主；全过程人民民主涵盖选举、决策、管理、监督各环节。'},

{q:'习近平法治思想"十一个坚持"首要的是？（2023云南定向选调·原题）',o:['依宪治国','党的领导','人民主体地位','依法治国'],a:1,e:'坚持党的领导。

为什么不是"依宪治国"？虽然依宪治国也很重要，但"十一个坚持"的第一条就是"坚持党对全面依法治国的领导"。逻辑：党的领导是法治的根本保证，依宪治国是法治的核心内容。'},

{q:'中国特色大国外交推动构建什么？（2022国考题·改编）',o:['新世界秩序','人类命运共同体','西方全球化','地区联盟'],a:1,e:'人类命运共同体。

中国特色大国外交的总目标不是建立新的世界秩序（那会被误解为霸权意图），也不是融入西方体系，而是推动构建人类命运共同体——这一理念已写入党章和宪法。'},

{q:'"双循环"中主体是？（2023国考题·改编）',o:['国际循环','国内循环','内外并重','出口导向'],a:1,e:'国内循环。

背景：2020年提出"以国内大循环为主体、国内国际双循环相互促进"的新发展格局。有些人误以为是要闭关锁国，实际上是因为中国有14亿人口的超大规模市场优势，内需是主体。'},

{q:'共同富裕最艰巨任务在哪？（2024云南定向选调·原题）',o:['城市','农村','沿海','特区'],a:1,e:'农村。

习近平在2021年中央财经委员会第十次会议上强调"促进共同富裕最艰巨最繁重的任务仍然在农村"。为什么？城乡收入差距约2.5倍，农村基础设施和公共服务短板明显，不解决农村的富裕就不是真正的共同富裕。'},

{q:'文化自信"更基础"体现在？（2024云南定向选调·原题）',o:['道路理论根基','制度基础','经济基础','军事基础'],a:0,e:'它是道路和理论的根基。

习近平强调"文化自信是更基础、更广泛、更深厚的自信"。为什么"更基础"？因为中国特色社会主义道路和理论体系都植根于中华优秀传统文化的沃土。记法：文化是根，没了根的树是假树。'}

]);

regQ('全国时政',[

{q:'二十届四中全会主题？（2024云南定向选调·原题）',o:['经济体制改革','依法治国','从严治党','全面深化改革推进中国式现代化'],a:3,e:'进一步全面深化改革、推进中国式现代化。

二十届四中全会2024年7月召开。为什么是这个主题？二十届二中全会（2023年）部署了党和国家机构改革，这是"改体制"；四中全会部署"全面深化改革"，这是"改机制"——两者形成递进关系。'},

{q:'2025年GDP目标？（2025国考行测·原题）',o:['3%','4%','5%','6%'],a:2,e:'5%左右。

为什么是5%？综合考虑了三方面因素：一是稳就业需要（每1%GDP增长带动约200万人就业）；二是潜在增长率（中国目前潜在增长率约5%-5.5%）；三是外部环境不确定性（中美科技竞争、欧盟碳关税等）。'},

{q:'十五五规划年份？（2024国考题·改编）',o:['2021-2025','2025-2030','2026-2030','2026-2035'],a:2,e:'2026-2030年。

"十五五"与2035年基本实现社会主义现代化目标直接衔接。注意答题陷阱：有人会选2026-2035（那是到2035年的中长期规划），"十五五"只是五年规划。'},

{q:'十五五核心战略导向？（2025云南定向选调·原题）',o:['高速增长','规模扩张','高质量发展','投资驱动'],a:2,e:'高质量发展。

为什么不是高速增长？中国GDP已达126万亿，基数巨大，保持高速增长不现实也不可持续。高质量发展要求从"有没有"转向"好不好"，核心是创新驱动而非要素投入驱动。'},

var ST = 'ynxuandiao_state';

var st = {mode:'quiz',cat:'新思想',idx:0,answered:false,sel:-1,history:{},wrongs:[],socs:[],dones:{},charts:[]};



function save(){

  try{localStorage.setItem(ST,JSON.stringify({history:st.history,wrongs:st.wrongs,socs:st.socs,dones:st.dones}))}catch(e){}

}

function load(){

  try{

    var r=localStorage.getItem(ST);if(!r)return false;

    var d=JSON.parse(r);if(d.history)st.history=d.history;if(d.wrongs)st.wrongs=d.wrongs;

    if(d.socs)st.socs=d.socs;if(d.dones)st.dones=d.dones;return true;

  }catch(e){return false}

}



// ===== INIT =====

function init(){

  var cats=Object.keys(QB);

  document.getElementById('categoryTabs').innerHTML=cats.map(function(c){return '<button class="nav-tab'+(c===st.cat?' active':'')+'" onclick="swCat(\''+c+'\')">'+c+'</button>'}).join('');

  if(!load())cats.forEach(function(c){st.history[c]={total:0,correct:0,wrong:0,errors:[]}});

  else cats.forEach(function(c){if(!st.history[c])st.history[c]={total:0,correct:0,wrong:0,errors:[]}});

  loadQ();upStats();

  setTimeout(renderAnalysis,500);

}



// ===== QUIZ =====

function gQ(c){return QB[c]||[]}

function loadQ(){

  var qs=gQ(st.cat);st.answered=false;st.sel=-1;

  if(!qs.length){document.getElementById('qContent').innerHTML='<p style="color:var(--text2);text-align:center;padding:40px 0">该模块暂无题目</p>';document.getElementById('optArea').innerHTML='';document.getElementById('actionBar').style.display='none';document.getElementById('explBox').classList.remove('show');return}

  var dk=function(i){return st.cat+'_'+i};

  var done=qs.filter(function(_,i){return st.dones[dk(i)]}).length;

  if(done>=qs.length){

    document.getElementById('qContent').innerHTML='<p style="text-align:center;padding:60px 20px;font-size:18px;">🎉 全部完成！<br><span style="font-size:14px;color:var(--text2);">切换其他模块继续刷题。</span></p>';

    document.getElementById('optArea').innerHTML='';document.getElementById('actionBar').style.display='none';document.getElementById('explBox').classList.remove('show');

    document.getElementById('qProg').textContent='已完成 '+done+'/'+qs.length;return;

  }

  for(var o=0;o<qs.length;o++){var idx=(st.idx+o)%qs.length;if(!st.dones[dk(idx)]){st.idx=idx;break}}

  var q=qs[st.idx];

  document.getElementById('qContent').innerHTML=q.q;

  document.getElementById('qCat').textContent=st.cat;

  document.getElementById('qCat').style.background=getCol(st.cat,'bg');document.getElementById('qCat').style.color=getCol(st.cat,'txt');

  document.getElementById('qProg').textContent='第 '+(done+1)+'/'+qs.length+' 题（未做）';

  document.getElementById('optArea').innerHTML='<div class=options-grid>'+q.o.map(function(o,i){return '<div class=option-item data-i='+i+' onclick="clickOpt('+i+')"><span class=opt-lbl>'+L[i]+'</span><span>'+o+'</span></div>'}).join('')+'</div>';

  document.getElementById('actionBar').style.display='flex';

  document.getElementById('nextHint').style.display='none';

  document.getElementById('explBox').classList.remove('show');

  var dk=document.getElementById('dkBtn');dk.disabled=false;dk.textContent='❓ 不会';

}



function clickOpt(i){

  if(st.answered){loadQ();return}

  st.sel=i;st.answered=true;

  var qs=gQ(st.cat),q=qs[st.idx];var ok=i===q.a;

  document.querySelectorAll('.option-item').forEach(function(el){

    el.classList.add('disabled');var ii=parseInt(el.dataset.i);

    if(ii===q.a)el.classList.add('correct');if(ii===i&&!ok)el.classList.add('wrong')

  });

  var h=st.history[st.cat];h.total++;

  if(ok)h.correct++;else{h.wrong++;var er={cat:st.cat,q:q.q,sel:i,cor:q.a,opts:q.o,ans:q.o[q.a],exp:q.e,der:[],unk:false};h.errors.push(er);st.wrongs.push(er)}

  st.dones[st.cat+'_'+st.idx]=true;

  document.getElementById('explText').textContent=q.e;document.getElementById('explBox').classList.add('show');

  document.getElementById('nextHint').style.display='inline';

  upStats();upErrs();save();autoSync();

}



function markUnknown(){

  if(st.answered)return;st.answered=true;

  var qs=gQ(st.cat),q=qs[st.idx];

  document.querySelectorAll('.option-item').forEach(function(el){el.classList.add('disabled');if(parseInt(el.dataset.i)===q.a)el.classList.add('correct')});

  var h=st.history[st.cat];h.total++;h.wrong++;

  var er={cat:st.cat,q:q.q,sel:-1,cor:q.a,opts:q.o,ans:q.o[q.a],exp:q.e,der:[],unk:true};

  h.errors.push(er);st.wrongs.push(er);

  st.dones[st.cat+'_'+st.idx]=true;

  document.getElementById('explText').textContent=q.e;document.getElementById('explBox').classList.add('show');

  document.getElementById('nextHint').style.display='inline';

  var dk=document.getElementById('dkBtn');dk.disabled=true;dk.textContent='❓ 已标记';

  upStats();upErrs();save();autoSync();

}



function swCat(c){st.cat=c;st.idx=0;document.querySelectorAll('#categoryTabs .nav-tab').forEach(function(t){t.classList.toggle('active',t.textContent===c)});loadQ()}



function upStats(){

  var t=0,c=0,w=0;Object.values(st.history).forEach(function(h){t+=h.total;c+=h.correct;w+=h.wrong});

  document.getElementById('totalCount').textContent=t;document.getElementById('correctCount').textContent=c;

  document.getElementById('wrongCount').textContent=w;document.getElementById('accuracyPct').textContent=t?Math.round(c/t*100)+'%':'0%';

}



function upErrs(){

  var all=st.wrongs;var act=all.filter(function(e){return !e._dis});var dis=all.filter(function(e){return e._dis});

  document.getElementById('errLabel').textContent='('+all.length+'，待消'+act.length+')';

  if(!all.length){document.getElementById('errList').innerHTML='<p style="color:var(--text2);text-align:center;padding:20px 0">暂无错题</p>';upSoc();return}

  var h='';

  act.forEach(function(e,i){

    var ri=all.indexOf(e);var p=e.dc?'<span style="font-size:12px;color:var(--primary);margin-left:8px;">'+e.dc+'/5</span>':'';

    h+='<div class=error-item onclick="togErr('+ri+')"><div class=err-q>['+e.cat+'] '+(e.q.length>40?e.q.slice(0,40)+'...':e.q)+p+'</div><div class=err-detail>你的答案：<span class=wrong-ans>'+(e.unk?'不会':L[e.sel])+'</span> | 正确答案：<span class=right-ans>'+L[e.cor]+'</span></div><div id=erD'+ri+' style="display:none;margin-top:8px"><p style="font-size:13px;color:var(--text2);padding:8px;background:#f8f9fa;border-radius:6px">'+e.exp+'</p><div id=derB'+ri+'><button class="btn btn-sm btn-pri" onclick="genDer('+ri+');event.stopPropagation()">生成衍生题</button><div id=derC'+ri+'></div></div></div></div>'

  });

  if(dis.length)h+='<details style=margin-top:12px><summary style="font-size:13px;color:var(--text2);cursor:pointer">已消错题('+dis.length+'道)</summary>'+dis.map(function(e){return '<div style="padding:8px;font-size:13px;color:var(--text2);border-bottom:1px solid var(--border)">['+e.cat+'] '+(e.q.length>50?e.q.slice(0,50)+'...':e.q)+' <span style="color:var(--success)">✓ 已消</span></div>'}).join('')+'</details>';

  document.getElementById('errList').innerHTML=h;upSoc();

}

function togErr(i){var e=document.getElementById('erD'+i);e.style.display=e.style.display==='none'?'block':'none'}

function genDer(i){

  var e=st.wrongs[i];var c=document.getElementById('derC'+i);

  if(!e.dc)e.dc=0;if(!e._di)e._di=true;

  var tpl=DER_TPL[e.cat]||DER_TPL['新思想'];

  var seed=e._ds||0;var qs=[];

  for(var j=0;j<5;j++)qs.push(tpl[(seed*3+j*2)%tpl.length]);

  e.der=qs;

  var pro=e.dc>=5?'<span style="color:var(--success);font-weight:600;">🎉 已答对5题</span>':'<span style="color:var(--text2);font-size:13px">答对进度：'+'★'.repeat(e.dc)+'☆'.repeat(5-e.dc)+' '+e.dc+'/5</span>';

  c.innerHTML='<div style=margin-bottom:6px>'+pro+'</div>'+qs.map(function(q,j){

    var qid='d_'+i+'_'+j;var wc=e._dd&&e._dd[qid]===true;var ww=e._dd&&e._dd[qid]===false;

    var dis=wc||ww||e.dc>=5;

    return '<div style="padding:10px 0;border-bottom:1px solid var(--border);opacity:'+(dis?0.6:1)+'"><div style="font-size:13px;font-weight:500;margin-bottom:6px">衍生'+(j+1)+'：'+q.q+'</div><div style="display:grid;gap:4px">'+

      q.o.map(function(o,k){return '<div class="option-item'+(dis?' disabled':'')+(wc?' correct':'')+(ww&&!e._ps?' wrong':'')+'" style="padding:6px 10px;font-size:13px" data-q="'+qid+'" data-ok="'+k+'" onclick="if(!this.classList.contains(\'disabled\')){event.stopPropagation();selDer(\''+qid+'\','+k+')}"><span class=opt-lbl style="width:22px;height:22px;font-size:11px">'+L[k]+'</span><span>'+o+'</span></div>'}).join('')+

      '</div><div style="margin-top:6px;display:flex;gap:6px"><button class="btn btn-sm btn-pri" onclick="event.stopPropagation();chkDer(\''+qid+'\','+q.a+','+i+');return false"'+(dis?' disabled':'')+'>确认</button><span id="'+qid+'_r" style="font-size:13px;line-height:28px">'+(wc?'<span style="color:var(--success);font-weight:600">✓</span>':ww?'<span style="color:var(--danger);font-weight:600">✗</span>':'')+'</span></div></div>'

  }).join('');

}

function selDer(qid,k){document.querySelectorAll('[data-q="'+qid+'"]').forEach(function(e){e.classList.toggle('selected',parseInt(e.dataset.ok)===k)});derSel[qid]=k}

function chkDer(qid,cor,i){

  var sel=derSel[qid];var r=document.getElementById(qid+'_r');

  if(sel===undefined){r.innerHTML='<span style="color:var(--text2)">请先选择</span>';return}

  document.querySelectorAll('[data-q="'+qid+'"]').forEach(function(e){e.classList.add('disabled');if(parseInt(e.dataset.ok)===cor)e.classList.add('correct');if(parseInt(e.dataset.ok)===sel&&sel!==cor)e.classList.add('wrong')});

  var ok=sel===cor;r.innerHTML=ok?'<span style="color:var(--success);font-weight:600">✓</span>':'<span style="color:var(--danger);font-weight:600">✗</span>';

  var e=st.wrongs[i];if(e){if(!e._dd)e._dd={};if(e._dd[qid]===undefined){e._dd[qid]=ok;

    if(ok){e.dc=(e.dc||0)+1;if(e.dc>=5){e._dis=true;upErrs()}else genDer(i)}

    else{e.dc=0;e._dd={};e._di=false;e._ds=(e._ds||0)+1;setTimeout(function(){genDer(i)},500)}

  }}

  save();r.scrollIntoView({behavior:'smooth',block:'nearest'});

}

    fetch('https://api.github.com/repos/bbrandaw24/ynxuandiao-trainer/contents/data/quiz_data.json',{headers:{'Authorization':'token '+T,'Accept':'application/vnd.github.v3+json'}})

    .then(function(r){return r.status===200?r.json():null})

    .then(function(ex){var b={message:'auto',content:c,branch:'main'};if(ex)b.sha=ex.sha;return fetch('https://api.github.com/repos/bbrandaw24/ynxuandiao-trainer/contents/data/quiz_data.json',{method:'PUT',headers:{'Authorization':'token '+T,'Content-Type':'application/json'},body:JSON.stringify(b)})})

    .catch(function(){})

  },3000)

}



// ===== REVIEW =====

function upSoc(){

  var d=st.socs;var c=document.getElementById('socList');

  if(!d.length){c.innerHTML='<p style="color:var(--text2);text-align:center;padding:30px">暂无对话记录</p>';return}

  c.innerHTML=d.map(function(e,i){

    var ms=e.msgs||[];var ch=ms.map(function(m){return '<div class="soc-'+(m.s==='ai'?'ai':'user')+'"><pre style="white-space:pre-wrap;font-family:inherit;margin:0;line-height:1.6">'+(m.s==='ai'?'🤖 ':'🙋 ')+m.t+'</pre></div>'}).join('');

    return '<div class=error-item onclick="var d=document.getElementById(\'socC'+i+'\');d.style.display=d.style.display===\'none\'?\'block\':\'none\'"><div class=err-q>['+e.cat+'] '+(e.q?e.q.slice(0,50)+'...':'')+'<span style="margin-left:auto;font-size:12px;color:var(--text2);float:right">'+ms.length+'条</span></div><div id=socC'+i+' style="display:none;margin-top:12px;padding:12px;background:#fafafa;border-radius:8px;max-height:500px;overflow-y:auto">'+ch+'<div style="margin-top:8px;padding:8px;background:#fef7e0;border-radius:6px;font-size:13px">📖 '+e.exp+'</div></div></div>'

  }).join('');

}



// ===== ANALYSIS =====

function renderAnalysis(){

  var tl=document.getElementById('tlBox');

  tl.innerHTML=EXAMS.map(function(d){return '<div style="padding:8px 0;border-left:2px solid var(--primary);padding-left:16px;margin-bottom:8px"><strong>'+d.y+'</strong><br><span style="font-size:13px;color:var(--text2)">'+d.n+' | 公基'+d.g+'题 + 行测'+d.x+'题</span></div>'}).join('');

  renderChart('ch1','bar',{labels:EXAMS.map(function(d){return d.y}),datasets:[{label:'公基',data:EXAMS.map(function(d){return d.g}),backgroundColor:'#1a73e8'},{label:'行测',data:EXAMS.map(function(d){return d.x}),backgroundColor:'#e8710a'}]},{scales:{x:{stacked:true},y:{stacked:true,max:100,title:{display:true,text:'题量'}}}});

  renderChart('ch2','bar',{labels:EXAMS.map(function(d){return d.y}),datasets:[{label:'言语',data:EXAMS.map(function(d){return d.xd.yy}),backgroundColor:'#e8450a'},{label:'判断',data:EXAMS.map(function(d){return d.xd.pd}),backgroundColor:'#1565c0'},{label:'数量',data:EXAMS.map(function(d){return d.xd.sl}),backgroundColor:'#6d4c41'},{label:'资料',data:EXAMS.map(function(d){return d.xd.zl}),backgroundColor:'#2e7d32'}]},{scales:{y:{beginAtZero:true,title:{display:true,text:'题量'}}}});

  renderChart('ch3','bar',{labels:EXAMS.map(function(d){return d.y}),datasets:[{label:'时政',data:EXAMS.map(function(d){return d.gd.sz}),backgroundColor:'#e8710a'},{label:'省情',data:EXAMS.map(function(d){return d.gd.sq}),backgroundColor:'#0f9d58'},{label:'法律',data:EXAMS.map(function(d){return d.gd.fl}),backgroundColor:'#185abc'},{label:'党史',data:EXAMS.map(function(d){return d.gd.ds}),backgroundColor:'#d93025'},{label:'马原',data:EXAMS.map(function(d){return d.gd.mk}),backgroundColor:'#9334e6'},{label:'科技',data:EXAMS.map(function(d){return d.gd.kj}),backgroundColor:'#00897b'}]},{scales:{y:{beginAtZero:true,title:{display:true,text:'题量'}}}});

  renderChart('ch4','line',{labels:EXAMS.map(function(d){return d.y}),datasets:[{label:'行测题量',data:EXAMS.map(function(d){return d.x}),borderColor:'#e8710a',backgroundColor:'#e8710a20',fill:true,tension:0.3,pointRadius:6}]},{scales:{y:{beginAtZero:true,max:60,title:{display:true,text:'题量'}}}});

  document.getElementById('stratBox').innerHTML='<p><strong>🎯 核心策略</strong></p><ul style="margin-top:8px;padding-left:20px;line-height:2"><li>行测从0题飙升至50题（占50%），必须投入一半以上时间</li><li>行测优先级：判断推理(16) > 资料分析(12)=言语理解(12) > 数量关系(10)</li><li>公基重点：时政(16)+省情(8)=24题，占公基一半</li><li>时间分配：判断25min→资料20min→言语20min→数量15min→公基35min→涂卡5min</li><li>多选题已取消，全单选题，策略上追求准确率</li><li>2026年起省情占比下降，全国时政/政治理论成为公基主体</li></ul>';

}

function renderChart(id,type,data,opts){

  var c=document.getElementById(id);if(!c)return;

  // Destroy existing chart

  st.charts.forEach(function(ch,i){if(ch.canvas===c){ch.destroy();st.charts.splice(i,1)}});

  st.charts.push(new Chart(c,{type:type,data:data,options:Object.assign({responsive:true,plugins:{legend:{position:'top'}}},opts||{})}));

}



// ===== MODE SWITCH =====

function switchMode(m){

  st.mode=m;document.querySelectorAll('.mode-btn').forEach(function(b){b.classList.toggle('active',b.dataset.mode===m)});

  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active')});

  if(m==='quiz')document.getElementById('quizPanel').classList.add('active');

  else if(m==='review'){document.getElementById('reviewPanel').classList.add('active');upSoc()}

  else if(m==='analysis'){document.getElementById('analysisPanel').classList.add('active');setTimeout(renderAnalysis,200)}

}



// ===== COLORS =====

function getCol(cat,t){

  var cs={'新思想':'#1a73e8','全国时政':'#e8710a','云南省情':'#0f9d58','党史':'#d93025','马原':'#9334e6','法律':'#185abc','科技文史地理':'#00897b','言语理解':'#e8450a','判断推理':'#1565c0','数量关系':'#6d4c41','资料分析':'#2e7d32'};

  var c=cs[cat]||'#666';return t==='bg'?c+'20':c;

}
